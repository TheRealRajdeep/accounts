auditConfig:
  ignoreGhsas:
    - GHSA-rmmr-r34h-pfm5 # affected versions have been removed from npm.

allowBuilds:
  bufferutil: true
  cloudflared: true
  cpu-features: true
  es5-ext: true
  esbuild: true
  protobufjs: true
  sharp: true
  simple-git-hooks: true
  ssh2: true
  utf-8-validate: true
  workerd: true

blockExoticSubdeps: true

catalog:
  '@cloudflare/vite-plugin': ^1.31.2
  '@cloudflare/workers-types': ^4.20260317.1
  '@tanstack/react-query': ^5.97.0
  '@tanstack/react-router': ^1.168.19
  '@tanstack/react-start': ^1.166.7
  '@total-typescript/ts-reset': ^0.6.1
  '@types/node': ^25.6.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  '@vitejs/devtools': ^0.1.15
  '@vitejs/plugin-react': ^5.2.0
  '@wagmi/core': ^3.4.10
  hono: ^4.12.18
  mppx: ^0.6.19
  ox: ~0.14.18
  prool: ~0.2.4
  react: ^19.2.5
  react-dom: ^19.2.5
  tsx: ^4.21.0
  typed-query-selector: ^2.12.1
  typescript: ^5.9.3
  viem: ^2.48.8
  vite: ^8.0.5
  vite-plus: ~0.1.18
  vp: npm:vite-plus@~0.1.18
  wagmi: ^3.6.12
  wrangler: ^4.85.0
  zod: ^4.3.6

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@mermaid-js/*'
  - '@voidzero-dev/*'
  - '@wagmi/connectors'
  - '@wagmi/core'
  - incur
  - mermaid
  - mppx
  - ox
  - regen-ui
  - secretlint
  - viem
  - vite-plus
  - wagmi

nodeOptions: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

overrides:
  accounts: 'workspace:*'
  file-type: '22.0.1'
  follow-redirects: '1.16.0'
  js-yaml@^3: '3.14.2'
  mermaid: '^11.14.1'
  ox: '~0.14.18'
  postcss: '8.5.14'
  protobufjs: '7.5.7'
  '@protobufjs/utf8': '1.1.1'
  qs: '6.15.1'
  # Pin to last version with npm provenance — 5.1.1 lost trust evidence.
  reselect: '5.1.0'
  react: 'catalog:'
  react-dom: 'catalog:'
  tar: '7.5.15'
  viem: 'catalog:'
  vite-plus: 'catalog:'
  vp: 'catalog:'
  wrangler: 'catalog:'

packages:
  - .
  - examples/*
  - playgrounds/*
  - ref-impls/*
  - site

peerDependencyRules:
  allowedVersions:
    accounts: '*'

shellEmulator: true

strictDepBuilds: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
  - chokidar@4.0.3
  - semver@6.3.1
  - slow-redact@0.3.2
  - undici-types@6.19.8

patchedDependencies:
  vocs@0.0.0: patches/vocs@0.0.0.patch
